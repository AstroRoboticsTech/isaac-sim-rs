[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "ISC",
    "OpenSSL",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "BSL-1.0",
]

[bans]
multiple-versions = "warn"

[advisories]
ignore = [
    "RUSTSEC-2025-0141",
    "RUSTSEC-2025-0057",
    "RUSTSEC-2024-0436",
]
