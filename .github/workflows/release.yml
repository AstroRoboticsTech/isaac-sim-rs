# SPDX-License-Identifier: MPL-2.0
name: release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify tag matches workspace version
        run: |
          TAG="${GITHUB_REF##*/v}"
          WS=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          [ "$TAG" = "$WS" ] || (echo "tag $TAG != workspace $WS"; exit 1)
      - run: cargo publish -p isaac-sim-arrow --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
      - run: sleep 30
      - run: cargo publish -p isaac-sim-bridge --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
      - run: sleep 30
      - run: cargo publish -p isaac-sim-dora --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
      - run: cargo publish -p isaac-sim-rerun --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
      - run: sleep 30
      - run: cargo publish -p isaac-sim-rs --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
